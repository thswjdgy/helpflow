name: helpflow
description: "HelpFlow - 헬프데스크 티켓 관리 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # 로컬 DB
  hive_flutter: ^1.1.0

  # 라우팅
  go_router: ^14.2.7

  # 차트 (7~8주차 활성화 예정)
  # fl_chart: ^0.68.0

  # Material Symbols 아이콘
  material_symbols_icons: ^4.2719.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  # riverpod_generator는 hive_generator ^2.0.1과 analyzer 충돌로 비활성화
  # 필요 시: hive_generator를 제거한 후 riverpod_generator ^2.4.3 활성화
  # riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
